name: Build Castify

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          # Use macos-15-intel for x86_64: macos-latest is ARM64, and PyInstaller
          # builds for the host arch, so an ARM runner would produce an ARM binary
          # mislabeled as x86_64 → "bad CPU type in executable" on Intel Macs.
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu
          - platform: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            args: --target aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Linux: WebKitGTK, Tauri system deps, and build tools for ffmpeg
      - name: Install Linux dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          # libappindicator3-dev was renamed to libayatana-appindicator3-dev on 24.04+
          APPINDICATOR="libappindicator3-dev"
          if ! apt-cache show libappindicator3-dev &>/dev/null; then
            APPINDICATOR="libayatana-appindicator3-dev"
          fi
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            "$APPINDICATOR" \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            build-essential

      # Windows: MSYS2 with mingw-w64 for building ffmpeg from source
      - name: Setup MSYS2
        if: matrix.platform == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            curl
            make
            diffutils
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-nasm
            mingw-w64-ucrt-x86_64-python
            mingw-w64-ucrt-x86_64-python-pip

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install npm dependencies
        run: npm ci

      # Build sidecar binaries (yt-dlp + minimal ffmpeg + deno runtime)
      - name: Build sidecar binaries (Unix)
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: bash scripts/build-dependencies.sh --target ${{ matrix.target }}

      - name: Build sidecar binaries (Windows)
        if: matrix.platform == 'windows-latest'
        shell: msys2 {0}
        run: |
          cd "$GITHUB_WORKSPACE"
          bash scripts/build-dependencies.sh --target ${{ matrix.target }}

      # macOS: Import Apple certificate for code signing
      - name: Import Apple certificate
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm certificate.p12

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS signing
          APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.platform, 'macos') && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ startsWith(matrix.platform, 'macos') && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ startsWith(matrix.platform, 'macos') && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ startsWith(matrix.platform, 'macos') && secrets.APPLE_TEAM_ID || '' }}
        with:
          args: ${{ matrix.args }}

      # Tauri re-signs all binaries inside the .app but strips our custom
      # entitlements from yt-dlp. Tauri then deletes the .app and only
      # leaves the DMG. Mount the DMG, copy .app out, re-sign yt-dlp with
      # disable-library-validation, re-seal the .app, and recreate the DMG.
      - name: Re-sign yt-dlp sidecar with entitlements (macOS)
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          DMG=$(find src-tauri/target -name '*.dmg' -not -name '*.sig' -type f | head -1)
          if [ -z "$DMG" ]; then
            echo "ERROR: DMG not found"
            find src-tauri/target -name 'Castify*' -type f 2>/dev/null || true
            exit 1
          fi
          echo "==> Found $DMG"

          # Mount DMG and copy contents out (DMG is read-only)
          MOUNT_DIR=$(mktemp -d)
          WORK_DIR=$(mktemp -d)
          hdiutil attach "$DMG" -mountpoint "$MOUNT_DIR" -nobrowse -quiet
          cp -R "$MOUNT_DIR/Castify.app" "$WORK_DIR/"
          # Preserve the Applications symlink for drag-to-install
          if [ -L "$MOUNT_DIR/Applications" ]; then
            ln -s /Applications "$WORK_DIR/Applications"
          fi
          hdiutil detach "$MOUNT_DIR" -quiet

          APP="$WORK_DIR/Castify.app"
          YTDLP="$APP/Contents/MacOS/yt-dlp"
          ENT="src-tauri/entitlements/yt-dlp.plist"

          # Re-sign yt-dlp with disable-library-validation entitlement
          echo "==> Re-signing yt-dlp with entitlements..."
          codesign --force --options runtime \
            --entitlements "$ENT" \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$YTDLP"
          codesign -dv --entitlements :- "$YTDLP"

          # Re-sign the .app (without --deep) to update the code seal
          echo "==> Re-signing Castify.app..."
          codesign --force --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$APP"

          # Recreate the DMG with same layout
          echo "==> Recreating DMG at $DMG..."
          rm -f "$DMG"
          hdiutil create -volname "Castify" -srcfolder "$WORK_DIR" \
            -ov -format UDZO "$DMG"

          # Re-notarize the new DMG (re-signing invalidated the original notarization)
          echo "==> Notarizing DMG..."
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG"

          echo "==> DMG recreated and notarized: $(du -h "$DMG" | cut -f1)"
          rm -rf "$WORK_DIR" "$MOUNT_DIR"

      # The DMG was re-created above, so the original .sig is invalid.
      # Re-sign the update artifact with the Tauri updater key.
      - name: Re-sign DMG for updater (macOS)
        if: startsWith(matrix.platform, 'macos')
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          DMG=$(find src-tauri/target -name '*.dmg' -not -name '*.sig' -type f | head -1)
          echo "==> Re-signing $DMG for updater..."
          npx @tauri-apps/cli signer sign "$DMG"

      # Repack AppImage with fuse3-compatible runtime so it works on
      # modern distros (Debian 13+, Fedora 40+) without libfuse2.
      - name: Repack AppImage (no libfuse2 dependency)
        if: contains(matrix.platform, 'ubuntu')
        shell: bash
        run: |
          set -euo pipefail
          APPIMAGE=$(find src-tauri/target -name '*.AppImage' -type f | head -1)
          if [ -z "$APPIMAGE" ]; then
            echo "No AppImage found, skipping repack"
            exit 0
          fi
          echo "==> Repacking $APPIMAGE with fuse3-compatible runtime..."

          # Detect host arch for appimagetool download
          HOST_ARCH="$(uname -m)"
          curl -fSL -o /tmp/appimagetool \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${HOST_ARCH}.AppImage"
          chmod +x /tmp/appimagetool

          # Extract the original AppImage
          "$APPIMAGE" --appimage-extract

          # Repack with the new runtime
          ARCH="$HOST_ARCH" /tmp/appimagetool --appimage-extract-and-run squashfs-root "$APPIMAGE"
          rm -rf squashfs-root

          echo "==> Repacked AppImage: $(du -h "$APPIMAGE" | cut -f1)"

      # The AppImage was repacked above, so the original .sig is invalid.
      # Re-sign the update artifact with the Tauri updater key.
      - name: Re-sign AppImage for updater (Linux)
        if: contains(matrix.platform, 'ubuntu')
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          APPIMAGE=$(find src-tauri/target -name '*.AppImage' -not -name '*.sig' -type f | head -1)
          if [ -n "$APPIMAGE" ]; then
            echo "==> Re-signing $APPIMAGE for updater..."
            npx @tauri-apps/cli signer sign "$APPIMAGE"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: castify-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.sig
          retention-days: 7

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -80

      - name: Generate latest.json
        env:
          VERSION: ${{ github.ref_name }}
          BASE_URL: https://github.com/Casti-fy/castify-web/releases/download/${{ github.ref_name }}
        run: |
          python3 - <<'PYEOF'
          import json, glob, os

          version = os.environ["VERSION"]
          base_url = os.environ["BASE_URL"]

          # Map target directories to Tauri updater platform keys and their updater artifact extension
          targets = {
              "aarch64-apple-darwin": ("darwin-aarch64", ".dmg"),
              "x86_64-apple-darwin":  ("darwin-x86_64",  ".dmg"),
              "x86_64-pc-windows-msvc": ("windows-x86_64", ".nsis.zip"),
              "x86_64-unknown-linux-gnu": ("linux-x86_64", ".AppImage"),
              "aarch64-unknown-linux-gnu": ("linux-aarch64", ".AppImage"),
          }

          platforms = {}
          for target, (platform_key, ext) in targets.items():
              target_dir = f"artifacts/castify-{target}"
              sig_files = glob.glob(f"{target_dir}/**/*{ext}.sig", recursive=True)
              for sig_path in sig_files:
                  artifact_path = sig_path[:-4]  # remove .sig
                  if os.path.isfile(artifact_path):
                      with open(sig_path, "r") as f:
                          sig = f.read().strip()
                      filename = os.path.basename(artifact_path)
                      platforms[platform_key] = {
                          "signature": sig,
                          "url": f"{base_url}/{filename}",
                      }

          from datetime import datetime, timezone
          latest = {
              "version": version,
              "notes": f"Castify {version}",
              "pub_date": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "platforms": platforms,
          }

          with open("artifacts/latest.json", "w") as f:
              json.dump(latest, f, indent=2)

          print(json.dumps(latest, indent=2))
          PYEOF

      - name: Create release on castify-web
        uses: softprops/action-gh-release@v2
        with:
          repository: Casti-fy/castify-web
          tag_name: ${{ github.ref_name }}
          name: Castify ${{ github.ref_name }}
          draft: false
          token: ${{ secrets.RELEASE_TOKEN }}
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.dmg.sig
            artifacts/**/*.exe
            artifacts/**/*.nsis.zip
            artifacts/**/*.nsis.zip.sig
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.AppImage.sig
            artifacts/latest.json
          body: |
            ## Castify ${{ github.ref_name }}

            ### Desktop app
            Download the installer for your platform:

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `.dmg` (aarch64) |
            | macOS (Intel) | `.dmg` (x64) |
            | Windows 10+ | `.exe` (NSIS installer) |
            | Linux (x86_64) | `.deb` or `.AppImage` (amd64) |
            | Linux (ARM64) | `.deb` or `.AppImage` (arm64) |
