name: Build Castify

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          # Use macos-15-intel for x86_64: macos-latest is ARM64, and PyInstaller
          # builds for the host arch, so an ARM runner would produce an ARM binary
          # mislabeled as x86_64 → "bad CPU type in executable" on Intel Macs.
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Linux: WebKitGTK, Tauri system deps, and build tools for ffmpeg
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            build-essential

      # Windows: MSYS2 with mingw-w64 for building ffmpeg from source
      - name: Setup MSYS2
        if: matrix.platform == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            curl
            make
            diffutils
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-nasm
            mingw-w64-ucrt-x86_64-python
            mingw-w64-ucrt-x86_64-python-pip

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install npm dependencies
        run: npm ci

      # Build sidecar binaries (yt-dlp + minimal ffmpeg + deno runtime)
      - name: Build sidecar binaries (Unix)
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: bash scripts/build-dependencies.sh --target ${{ matrix.target }}

      - name: Build sidecar binaries (Windows)
        if: matrix.platform == 'windows-latest'
        shell: msys2 {0}
        run: |
          cd "$GITHUB_WORKSPACE"
          bash scripts/build-dependencies.sh --target ${{ matrix.target }}

      # macOS: Import Apple certificate for code signing
      - name: Import Apple certificate
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm certificate.p12

      - name: Codesign yt-dlp sidecar (macOS)
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          BIN="src-tauri/binaries/yt-dlp-${{ matrix.target }}"
          ENT="src-tauri/entitlements/yt-dlp.plist"
          if [ ! -f "$BIN" ]; then
            echo "ERROR: missing sidecar $BIN"
            ls -la src-tauri/binaries || true
            exit 1
          fi
          if [ ! -f "$ENT" ]; then
            echo "ERROR: missing entitlements $ENT"
            exit 1
          fi
          if [ -z "${APPLE_SIGNING_IDENTITY:-}" ]; then
            echo "ERROR: APPLE_SIGNING_IDENTITY is empty"
            exit 1
          fi
          codesign --force --options runtime \
            --entitlements "$ENT" \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$BIN"
          codesign -dv --entitlements :- "$BIN" || true

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing
          APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.platform, 'macos') && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ startsWith(matrix.platform, 'macos') && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ startsWith(matrix.platform, 'macos') && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ startsWith(matrix.platform, 'macos') && secrets.APPLE_TEAM_ID || '' }}
        with:
          args: ${{ matrix.args }}

      # Repack AppImage with fuse3-compatible runtime so it works on
      # modern distros (Debian 13+, Fedora 40+) without libfuse2.
      - name: Repack AppImage (no libfuse2 dependency)
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          set -euo pipefail
          APPIMAGE=$(find src-tauri/target -name '*.AppImage' -type f | head -1)
          if [ -z "$APPIMAGE" ]; then
            echo "No AppImage found, skipping repack"
            exit 0
          fi
          echo "==> Repacking $APPIMAGE with fuse3-compatible runtime..."

          # Download latest appimagetool (ships fuse3/no-fuse runtime)
          curl -fSL -o /tmp/appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool

          # Extract the original AppImage
          "$APPIMAGE" --appimage-extract

          # Repack with the new runtime
          ARCH=x86_64 /tmp/appimagetool --appimage-extract-and-run squashfs-root "$APPIMAGE"
          rm -rf squashfs-root

          echo "==> Repacked AppImage: $(du -h "$APPIMAGE" | cut -f1)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: castify-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
          retention-days: 7

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -80

      - name: Create release on castify-web
        uses: softprops/action-gh-release@v2
        with:
          repository: Casti-fy/castify-web
          tag_name: ${{ github.ref_name }}
          name: Castify ${{ github.ref_name }}
          draft: false
          token: ${{ secrets.RELEASE_TOKEN }}
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.AppImage
          body: |
            ## Castify ${{ github.ref_name }}

            ### Desktop app
            Download the installer for your platform:

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `.dmg` (aarch64) |
            | macOS (Intel) | `.dmg` (x64) |
            | Windows 10+ | `.exe` (NSIS installer) |
            | Linux | `.deb` or `.AppImage` |
